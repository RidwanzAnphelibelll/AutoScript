global
    log /dev/log local0
    log /dev/log local1 notice
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 1d
    maxconn 20000
    tune.h2.initial-window-size 268435456
    tune.ssl.default-dh-param 2048
    tune.bufsize 32768
    tune.maxrewrite 1024
    pidfile /run/haproxy.pid
    chroot /var/lib/haproxy
    user haproxy
    group haproxy
    daemon
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull
    option redispatch
    retries 5
    timeout connect 1s
    timeout client 60s
    timeout server 60s
    timeout tunnel 60s
    timeout http-request 15s
    timeout http-keep-alive 15s
    timeout check 5s
    maxconn 10000
    option tcpka

frontend multiport
    mode tcp
    bind *:222-1000 tfo
    bind-process 1 2
    tcp-request inspect-delay 500ms
    tcp-request content accept if HTTP
    tcp-request content accept if { req.ssl_hello_type 1 }
    use_backend recir_http if HTTP
    default_backend recir_https

frontend multiports
    mode tcp
    bind abns@haproxy-http accept-proxy tfo
    default_backend recir_https_general

frontend ssl
    mode tcp
    bind *:443 ssl crt /etc/haproxy/hap.pem alpn h2,http/1.1 tfo
    bind *:1194 tfo
    bind abns@haproxy-https accept-proxy ssl crt /etc/haproxy/hap.pem alpn h2,http/1.1 tfo
    tcp-request inspect-delay 500ms
    tcp-request content capture req.ssl_sni len 100
    tcp-request content accept if { req.ssl_hello_type 1 }
    acl chk_upgrade hdr(Connection) -i upgrade
    acl chk_websocket hdr(Upgrade) -i websocket
    acl specific_payload payload(0,7) -m bin 5353482d322e30
    acl up_to_http2 ssl_fc_alpn -i h2
    acl is_stream path_beg -i /stream
    acl is_api path_beg -i /api
    use_backend app_general if up_to_http2
    use_backend app_streaming if chk_upgrade chk_websocket
    use_backend app_streaming if is_stream
    use_backend app_automated if specific_payload
    use_backend api_backend if is_api
    default_backend app_distributed

frontend tunnel_vpn
    mode tcp
    bind *:1194 tfo
    default_backend vpn_backend

backend recir_https_general
    mode tcp
    balance roundrobin
    server main-backend 127.0.0.1:2223 check

backend app_streaming
    mode tcp
    balance leastconn
    option tcp-check
    server stream_server1 127.0.0.1:19350 check
    server stream_server2 127.0.0.1:19351 check

backend app_general
    mode tcp
    balance roundrobin
    server app-group 127.0.0.1:1013 send-proxy check

backend app_distributed
    mode tcp
    balance roundrobin
    server server-1 127.0.0.1:1194 check
    server server-2 127.0.0.1:1012 send-proxy check

backend app_automated
    mode tcp
    balance leastconn
    server rs-backend 127.0.0.1:2222 check

backend api_backend
    mode http
    balance roundrobin
    option httpchk GET /health
    server api_server1 127.0.0.1:8080 check
    server api_server2 127.0.0.1:8081 check

backend vpn_backend
    mode tcp
    balance roundrobin
    server vpn_server1 127.0.0.1:1194 maxconn 100 check

backend websocket_backend
    mode http
    balance leastconn
    option http-server-close
    server ws_server1 127.0.0.1:9001 check
    server ws_server2 127.0.0.1:9002 check

backend recir_http
    mode tcp
    option tcp-check
    server loopback-for-http abns@haproxy-http send-proxy-v2 check

backend recir_https
    mode tcp
    option tcp-check
    server loopback-for-https abns@haproxy-https send-proxy-v2 check